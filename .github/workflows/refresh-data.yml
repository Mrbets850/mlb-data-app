name: Refresh Baseball Savant data

# Runs across the 24-hour MLB slate cycle so the app always has fresh
# Statcast leaderboards regardless of when the slate-day user opens it.
#
# Times are UTC. CT (America/Chicago) is UTC-5 (CDT) / UTC-6 (CST).
#  - 11:00 UTC =  6 AM CT  : pre-dawn refresh, ahead of any slate
#  - 15:00 UTC = 10 AM CT  : late-morning, lineups are starting to drop
#  - 19:00 UTC =  2 PM CT  : early-afternoon, most lineups confirmed
#  - 23:00 UTC =  6 PM CT  : evening slate refresh
#  - 03:00 UTC = 10 PM CT  : late-night cleanup after most games end
#
# Each run only commits if a CSV actually changed, so duplicate runs at
# quiet times are cheap no-ops.
#
# Also exposed via "Run workflow" so manual refresh works from the
# Actions tab any time.
on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 19 * * *"
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# Need write access so the action can commit refreshed CSVs back to main.
permissions:
  contents: write

# Avoid two runs racing each other to push the same CSVs.
concurrency:
  group: refresh-savant-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No third-party deps — script uses only the standard library.

      - name: Download fresh CSVs from Baseball Savant
        run: python scripts/refresh_savant.py --out-dir .

      - name: Show what changed
        run: |
          echo "Modified files:"
          git status --porcelain
          echo "---"
          git diff --stat || true

      - name: Commit & push if anything changed
        env:
          GIT_AUTHOR_NAME: "savant-refresh-bot"
          GIT_AUTHOR_EMAIL: "savant-refresh-bot@users.noreply.github.com"
          GIT_COMMITTER_NAME: "savant-refresh-bot"
          GIT_COMMITTER_EMAIL: "savant-refresh-bot@users.noreply.github.com"
        run: |
          # Stage only the CSVs we manage; ignore any other accidental changes.
          git add -- 'Data:savant_batters.csv.csv' \
                     'Data:savant_batters_all.csv.csv' \
                     'Data:savant_pitchers.csv.csv' \
                     'Data:savant_pitcher_stats.csv' \
                     'Data:savant_bat_tracking.csv'
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%MZ")
          git commit -m "Auto-refresh Savant data ${STAMP}"
          # Pull --rebase first so concurrent runs don't fail to push.
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main
