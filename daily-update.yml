name: Daily MLB Data Update

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

jobs:
  update-
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install updater packages
        run: pip install -r requirements-data.txt

      - name: Run updater
        env:
          MLB_SEASON: "2026"
          BATTER_QUAL: "20"
          PITCHER_QUAL: "20"
        run: python update_data.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/savant_batters.csv data/savant_pitchers.csv data/last_update.csv
          git diff --staged --quiet || git commit -m "Daily data update"

      - name: Push changes
        run: git push
